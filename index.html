<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineroHub</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fff;
            color: #000;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #000;
            color: #fff;
        }
        header h1 {
            margin: 0;
            font-size: 24px;
        }
        header button {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .slide-section {
            margin: 20px;
        }
        .slide-section h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        .slider {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            scrollbar-width: none; /* Hide scrollbar for Firefox */
        }
        .slider::-webkit-scrollbar {
            display: none; /* Hide scrollbar for Chrome, Safari, and Edge */
        }
        .card {
            flex: 0 0 auto;
            width: 200px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background-color: #f9f9f9;
        }
        .card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        .card h3 {
            font-size: 18px;
            margin: 10px;
        }
        .card p {
            font-size: 14px;
            margin: 0 10px 10px 10px;
            color: #555;
        }
        .card button {
            display: block;
            width: calc(100% - 20px);
            margin: 0 10px 10px 10px;
            padding: 10px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background-color: #000;
            color: #fff;
            padding: 10px 0;
        }
        .bottom-nav button {
            background: none;
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .profile {
            display: none;
            text-align: center;
            margin: 20px;
        }
        .profile img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }
        .profile h2, .profile p {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>DineroHub</h1>
        <button id="explore" onclick="showPage('explore')">Explore</button>
    </header>

    <main id="home">
        <div class="slide-section">
            <h2>🔥 Trending Airdrops</h2>
            <div class="slider">
                <div class="card">
                    <img src="https://via.placeholder.com/200" alt="Airdrop 1">
                    <h3>Airdrop 1</h3>
                    <p>Earn 100 tokens now!</p>
                    <button>Launch</button>
                </div>
                <div class="card">
                    <img src="https://via.placeholder.com/200" alt="Airdrop 2">
                    <h3>Airdrop 2</h3>
                    <p>Exclusive rewards await!</p>
                    <button>Launch</button>
                </div>
            </div>
        </div>

        <div class="slide-section">
            <h2>🌟 New Airdrops</h2>
            <div class="slider">
                <div class="card">
                    <img src="https://via.placeholder.com/200" alt="Airdrop A">
                    <h3>Airdrop A</h3>
                    <p>Join early and earn!</p>
                    <button>Launch</button>
                </div>
                <div class="card">
                    <img src="https://via.placeholder.com/200" alt="Airdrop B">
                    <h3>Airdrop B</h3>
                    <p>Don't miss out!</p>
                    <button>Launch</button>
                </div>
            </div>
        </div>
    </main>

    <section id="profile" class="profile">
        <img id="profile-pic" src="https://via.placeholder.com/100" alt="Profile Picture">
        <h2 id="username">@Username</h2>
        <p id="bio">Bio goes here</p>
    </section>

    <nav class="bottom-nav">
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('categories')">Categories</button>
        <button onclick="showPage('explore')">Explore</button>
        <button onclick="showPage('profile')">Profile</button>
    </nav>

    <script>
        // Navigation logic
        function showPage(page) {
            document.getElementById('home').style.display = (page === 'home') ? 'block' : 'none';
            document.getElementById('profile').style.display = (page === 'profile') ? 'block' : 'none';
        }

        // Load user data from Telegram WebApp
        const userData = window.Telegram.WebApp.initDataUnsafe;
        if (userData.user) {
            document.getElementById('profile-pic').src = userData.user.photo_url || 'https://via.placeholder.com/100';
            document.getElementById('username').innerText = `@${userData.user.username || 'Anonymous'}`;
            document.getElementById('bio').innerText = userData.user.bio || 'No bio provided';
        }

        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
